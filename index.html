<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>

    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>

    <section class="conteudo">

        <div class="conteudo-titulo">
            <img src="assets/unlock.svg" alt="cadeado">
            <h2 class="titulo-principal">Gerador de Senhas</h2>
            <h3 class="titulo-secundario">
                Gere senhas seguras e personalizadas instantaneamente
            </h3>
        </div>

        <div class="conteudo-senha">
            <label for="campo-senha">Senha gerada</label>
            <input type="text" id="campo-senha" readonly>
        </div>

        <div class="parametro">

            <h3 class="parametro-titulo">Personalize sua senha</h3>

            <div class="parametro-coluna__senha">

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">Quantidade de caracteres</h4>

                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao">-</button>
                        <p class="parametro-senha__texto">12</p>
                        <button class="parametro-senha__botao">+</button>
                    </div>

                </div>

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">Tipos de caracteres</h4>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" class="checkbox" checked>
                        <label>Letras maiúsculas</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" class="checkbox">
                        <label>Letras minúsculas</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" class="checkbox">
                        <label>Números</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" class="checkbox">
                        <label>Símbolos</label>
                    </div>

                </div>

                <div class="parametro-senha">

                    <h4 class="parametro-senha__titulo">Força da senha</h4>

                    <div class="barra"></div>
                    <div class="forca fraca"></div>

                    <div class="parametro-senha-textos">
                        <p>Fraca</p>
                        <p>Média</p>
                        <p>Forte</p>
                    </div>

                    <p class="entropia"></p>

                </div>

            </div>
        </div>

    </section>

    <footer class="rodape">
        Projeto desenvolvido com base na Alura
    </footer>

    <script src="main.js"></script>

</body>
</html>
